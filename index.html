<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WStory · Виртуальный футбол</title>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Telegram Mini App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Шрифт Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ... (стили точно такие же, как в предыдущем ответе, но я их сокращу для экономии места) ... */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #f5f7fa; --card-bg: #ffffff; --text: #1e1f22; --hint: #8e8e93;
            --link: #2481cc; --button: #2ea6ff; --button-text: #ffffff;
            --divider: rgba(0,0,0,0.06); --success: #2ecc71; --danger: #e74c3c;
            --transition-theme: background-color 0.3s ease, color 0.2s ease;
        }
        body.dark {
            --bg: #1a1b1e; --card-bg: #2c2d30; --text: #f0f0f0; --hint: #9a9b9e;
            --link: #5eb0ff; --button: #2ea6ff; --button-text: #ffffff; --divider: rgba(255,255,255,0.08);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 24px; transition: var(--transition-theme); -webkit-tap-highlight-color: transparent; }
        .app-container { max-width: 480px; margin: 0 auto; padding: 16px 16px 28px; }
        /* Splash */
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; transition: opacity 0.4s; pointer-events: none; }
        .splash-content { text-align: center; animation: fadePulse 1.5s infinite; }
        .splash-logo { width: 90px; height: 90px; background: linear-gradient(145deg, #13294b, #0b1a2f); border-radius: 28px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; color: white; font-size: 48px; box-shadow: 0 20px 30px rgba(0,0,0,0.2); }
        @keyframes fadePulse { 0% { opacity: 0.8; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1); } 100% { opacity: 0.8; transform: scale(0.98); } }
        /* Header, Tabs, Cards, Tables ... (идентичны предыдущей версии) */
        .app-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo-icon { width: 44px; height: 44px; background: linear-gradient(145deg, #13294b, #0b1a2f); border-radius: 16px; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; }
        .tabs-container { display: flex; background: var(--card-bg); border-radius: 24px; padding: 4px; margin-bottom: 24px; border: 1px solid var(--divider); }
        .tab-btn { flex: 1; padding: 12px 0; border: none; background: transparent; font-weight: 600; font-size: 15px; border-radius: 20px; color: var(--hint); transition: all 0.25s; display: flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer; }
        .tab-btn.active { background: var(--button); color: var(--button-text); }
        .card { background: var(--card-bg); border-radius: 26px; padding: 18px 16px; box-shadow: 0 10px 22px rgba(0,0,0,0.02); border: 1px solid var(--divider); }
        .uefa-table { width: 100%; border-collapse: collapse; }
        .uefa-table td { padding: 12px 0; border-bottom: 1px solid var(--divider); }
        .team-cell { display: flex; align-items: center; gap: 12px; }
        .team-logo { width: 32px; height: 32px; background: linear-gradient(145deg, #2c3e50, #1a252f); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; }
        .hidden { display: none !important; }
        .loader { width: 30px; height: 30px; border: 3px solid var(--divider); border-top-color: var(--button); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .admin-panel { margin-top: 20px; padding-top: 16px; border-top: 1px dashed var(--divider); }
        .admin-btn { background: var(--button); color: white; border: none; padding: 8px 16px; border-radius: 30px; font-weight: 600; cursor: pointer; }
        input, select { background: var(--bg); border: 1px solid var(--divider); border-radius: 12px; padding: 10px; color: var(--text); width: 100%; margin-bottom: 10px; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); display: flex; align-items: flex-end; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-sheet { background: var(--card-bg); width: 100%; max-width: 480px; border-radius: 32px 32px 0 0; padding: 24px 20px 30px; transform: translateY(100%); transition: transform 0.3s; }
        .modal.active .modal-sheet { transform: translateY(0); }
    </style>
</head>
<body>
    <div id="splash-screen">
        <div class="splash-content">
            <div class="splash-logo"><i class="fas fa-futbol"></i></div>
            <div class="splash-title">WStory</div>
            <div class="splash-sub">виртуальный футбол</div>
        </div>
    </div>

    <div class="app-container tg-theme">
        <header class="app-header">
            <div class="logo" id="adminTrigger">
                <div class="logo-icon"><i class="fas fa-futbol"></i></div>
                <div class="logo-text"><h1>WStory</h1><span>виртуальный футбол</span></div>
            </div>
            <div class="header-actions">
                <div class="theme-toggle" id="themeToggle"><i class="fas fa-sun"></i><span>Тема</span></div>
                <div class="live-badge"><i class="fas fa-circle" style="color: #2ecc71; font-size: 10px;"></i> LIVE</div>
            </div>
        </header>

        <div class="tabs-container">
            <button class="tab-btn active" data-tab="rating"><i class="fas fa-trophy"></i> Рейтинг</button>
            <button class="tab-btn" data-tab="leagues"><i class="fas fa-table"></i> Лиги</button>
            <button class="tab-btn" data-tab="matches"><i class="fas fa-calendar"></i> Матчи</button>
        </div>

        <div id="tab-content">
            <div id="rating-tab">
                <div class="rating-toggle">
                    <button class="rating-toggle-btn active" data-rating="clubs">🏆 Клубы</button>
                    <button class="rating-toggle-btn" data-rating="leagues">🌍 Лиги</button>
                </div>
                <div class="card"><div id="ratingTableContainer"><div class="loader"></div></div></div>
            </div>
            <div id="leagues-tab" class="hidden">
                <div class="section-title"><h3>🏁 Турниры</h3><span id="leagueCount"></span></div>
                <div class="leagues-scroll" id="leaguesChips"></div>
                <div class="card" id="leagueTableContainer"><div class="loader"></div></div>
            </div>
            <div id="matches-tab" class="hidden">
                <div class="section-title"><h3>⚽ Предстоящие матчи</h3></div>
                <select class="filter-select" id="leagueFilterSelect"></select>
                <div class="card"><div id="matchesList"><div class="loader"></div></div>
                    <div id="adminMatchPanel" class="admin-panel hidden"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="matchModal">
        <div class="modal-sheet">
            <div style="display:flex; justify-content:space-between;">
                <h3 style="font-weight:700;">📊 Статистика матча</h3>
                <i class="fas fa-times close-modal" onclick="app.closeModal()" style="font-size:24px; cursor:pointer;"></i>
            </div>
            <div id="modalMatchContent"></div>
        </div>
    </div>

    <script>
        // ---------- Инициализация Supabase ----------
        const SUPABASE_URL = 'https://uutcoqfkbijosljtrnsn.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV1dGNvcWZrYmlqb3NsanRybnNuIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NTc3OTA0NCwiZXhwIjoyMDkxMzU1MDQ0fQ.GfYMIVtrgs-pT6EZyd9Dxn9ZW4_wMxZIoprtq2zB8us';
        
        // ВНИМАНИЕ: Используется service_role ключ. В production обязательно замените на anon key!
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Telegram
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }

        // ---------- Глобальное состояние ----------
        const app = {
            leagues: [],
            teams: [],
            matches: [],
            teamStatsMap: new Map(),
            leagueCoeffMap: new Map(),
            clubCoeffMap: new Map(),
            currentRatingType: 'clubs',
            selectedLeagueId: null,
            selectedMatchLeague: 'all',
            isAdmin: false, // включается по долгому нажатию на лого

            // Загрузка данных из Supabase
            async loadData() {
                try {
                    // Загружаем лиги
                    const { data: leaguesData } = await supabase.from('leagues').select('*');
                    this.leagues = leaguesData || [];
                    
                    // Загружаем команды
                    const { data: teamsData } = await supabase.from('teams').select('*');
                    this.teams = teamsData || [];
                    
                    // Загружаем матчи
                    const { data: matchesData } = await supabase.from('matches').select('*');
                    this.matches = matchesData || [];
                    
                    // Загружаем статистику из представления
                    const { data: statsData } = await supabase.from('team_stats').select('*');
                    if (statsData) {
                        statsData.forEach(s => this.teamStatsMap.set(s.team_id, s));
                    }
                    
                    // Вычисляем коэффициенты лиг и клубов
                    this.calculateCoefficients();
                    
                    return true;
                } catch (e) {
                    console.error('Ошибка загрузки:', e);
                    return false;
                }
            },

            calculateCoefficients() {
                // Коэффициенты лиг: среднее количество очков команд в лиге * 2.5
                this.leagues.forEach(league => {
                    const leagueTeams = this.teams.filter(t => t.league_id === league.id);
                    let totalPoints = 0, totalGames = 0;
                    leagueTeams.forEach(t => {
                        const s = this.teamStatsMap.get(t.id);
                        if (s) { totalPoints += s.points; totalGames += s.played; }
                    });
                    const avg = totalGames ? (totalPoints / totalGames) * 2.5 : 10;
                    this.leagueCoeffMap.set(league.id, +avg.toFixed(3));
                });
                // Клубные коэффициенты: 40% от коэффициента лиги + 60% от личных очков за игру
                this.teams.forEach(team => {
                    const leagueCoef = this.leagueCoeffMap.get(team.league_id) || 10;
                    const stats = this.teamStatsMap.get(team.id);
                    const perf = stats ? (stats.points / Math.max(stats.played, 1)) * 2.2 : 5;
                    this.clubCoeffMap.set(team.id, +(leagueCoef * 0.4 + perf).toFixed(3));
                });
            },

            // Коэффициенты ставок
            calculateOdds(homeId, awayId) {
                const homeC = this.clubCoeffMap.get(homeId) || 20;
                const awayC = this.clubCoeffMap.get(awayId) || 20;
                let homeStr = homeC * 1.1, awayStr = awayC;
                const total = homeStr + awayStr + 2.5;
                let homeProb = homeStr / total, awayProb = awayStr / total, drawProb = 1 - homeProb - awayProb;
                const minOdd = 1.03;
                let homeOdd = Math.max(minOdd, 1 / Math.max(homeProb, 0.12)).toFixed(2);
                let drawOdd = Math.max(minOdd, 1 / Math.max(drawProb, 0.18)).toFixed(2);
                let awayOdd = Math.max(minOdd, 1 / Math.max(awayProb, 0.12)).toFixed(2);
                return { home: +homeOdd, draw: +drawOdd, away: +awayOdd };
            },

            // Рендер рейтинга
            renderRating() {
                const container = document.getElementById('ratingTableContainer');
                if (!this.teams.length) {
                    container.innerHTML = '<div class="empty-state">Нет данных</div>';
                    return;
                }
                if (this.currentRatingType === 'clubs') {
                    const sorted = [...this.clubCoeffMap.entries()].sort((a,b) => b[1] - a[1]).slice(0, 30);
                    let html = `<table class="uefa-table"><thead><tr><th>#</th><th>Клуб</th><th>Коэфф.</th><th>Форма</th></tr></thead><tbody>`;
                    sorted.forEach(([teamId, coeff], idx) => {
                        const team = this.teams.find(t => t.id === teamId);
                        const stats = this.teamStatsMap.get(teamId);
                        if (!team) return;
                        html += `<tr><td>${idx+1}</td><td><div class="team-cell"><div class="team-logo">${team.short_name || team.name.substring(0,2)}</div>${team.name}</div></td>
                            <td>${coeff.toFixed(3)}</td><td class="form-badge">${stats?.form ? stats.form.split('').map(ch => `<span class="${ch==='W'?'win':ch==='D'?'draw':'loss'}">${ch}</span>`).join('') : ''}</td></tr>`;
                    });
                    html += '</tbody></table>';
                    container.innerHTML = html;
                } else {
                    const sorted = [...this.leagueCoeffMap.entries()].sort((a,b) => b[1] - a[1]);
                    let html = `<table class="uefa-table"><thead><tr><th>#</th><th>Лига</th><th>Коэффициент</th></tr></thead><tbody>`;
                    sorted.forEach(([lid, coeff], idx) => {
                        const league = this.leagues.find(l => l.id === lid);
                        if (!league) return;
                        html += `<tr><td>${idx+1}</td><td><div class="team-cell"><div class="team-logo">${league.country || '🌍'}</div>${league.name}</div></td><td>${coeff.toFixed(3)}</td></tr>`;
                    });
                    html += '</tbody></table>';
                    container.innerHTML = html;
                }
            },

            renderLeagues() {
                const chips = document.getElementById('leaguesChips');
                chips.innerHTML = this.leagues.map(l => 
                    `<div class="league-chip ${this.selectedLeagueId === l.id ? 'active' : ''}" data-id="${l.id}">${l.country || '🌍'} ${l.name}</div>`
                ).join('');
                document.getElementById('leagueCount').innerText = `${this.leagues.length} лиг`;
                chips.querySelectorAll('.league-chip').forEach(el => el.addEventListener('click', () => {
                    this.selectedLeagueId = el.dataset.id;
                    this.renderLeagues();
                    this.renderLeagueTable();
                }));
                if (!this.selectedLeagueId && this.leagues.length) this.selectedLeagueId = this.leagues[0].id;
                this.renderLeagueTable();
            },

            renderLeagueTable() {
                const container = document.getElementById('leagueTableContainer');
                const league = this.leagues.find(l => l.id === this.selectedLeagueId);
                if (!league) { container.innerHTML = '<div class="empty-state">Выберите лигу</div>'; return; }
                const leagueTeams = this.teams.filter(t => t.league_id === this.selectedLeagueId);
                const stats = leagueTeams.map(t => ({ team: t, stats: this.teamStatsMap.get(t.id) }))
                    .filter(s => s.stats)
                    .sort((a,b) => b.stats.points - a.stats.points || b.stats.goal_diff - a.stats.goal_diff);
                let html = `<div style="display:flex; gap:10px; margin-bottom:16px;"><span style="font-size:28px;">${league.country || '🌍'}</span><h3>${league.name}</h3></div>`;
                html += `<table class="uefa-table"><thead><tr><th>#</th><th>Команда</th><th>И</th><th>В</th><th>Н</th><th>П</th><th>Мячи</th><th>О</th></tr></thead><tbody>`;
                stats.forEach((item, idx) => {
                    const s = item.stats;
                    html += `<tr><td>${idx+1}</td><td><div class="team-cell"><div class="team-logo">${item.team.short_name || item.team.name.substring(0,2)}</div>${item.team.name}</div></td>
                        <td>${s.played}</td><td>${s.wins}</td><td>${s.draws}</td><td>${s.losses}</td><td>${s.goals_for}:${s.goals_against}</td><td><strong>${s.points}</strong></td></tr>`;
                });
                html += '</tbody></table>';
                container.innerHTML = html;
            },

            renderMatches() {
                const filter = document.getElementById('leagueFilterSelect');
                filter.innerHTML = '<option value="all">Все лиги</option>' + this.leagues.map(l => `<option value="${l.id}">${l.name}</option>`).join('');
                filter.value = this.selectedMatchLeague;
                filter.onchange = () => { this.selectedMatchLeague = filter.value; this.renderMatchesList(); };
                this.renderMatchesList();
                this.renderAdminPanel();
            },

            renderMatchesList() {
                const container = document.getElementById('matchesList');
                let filtered = this.matches.filter(m => m.status === 'scheduled');
                if (this.selectedMatchLeague !== 'all') filtered = filtered.filter(m => m.league_id === this.selectedMatchLeague);
                filtered.sort((a,b) => new Date(a.match_date) - new Date(b.match_date));
                if (!filtered.length) { container.innerHTML = '<div class="empty-state">Нет матчей</div>'; return; }
                let html = '';
                filtered.slice(0, 20).forEach(m => {
                    const home = this.teams.find(t => t.id === m.home_team_id);
                    const away = this.teams.find(t => t.id === m.away_team_id);
                    if (!home || !away) return;
                    const odds = this.calculateOdds(m.home_team_id, m.away_team_id);
                    const date = new Date(m.match_date);
                    const time = date.toLocaleDateString('ru',{day:'numeric',month:'short'}) + ' ' + date.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
                    html += `<div class="match-item" data-match-id="${m.id}">
                        <div class="match-info"><div class="match-teams">
                            <div class="match-team"><div class="team-logo">${home.short_name || home.name.substring(0,2)}</div>${home.name}</div>
                            <div class="match-team"><div class="team-logo">${away.short_name || away.name.substring(0,2)}</div>${away.name}</div>
                        </div><div style="font-size:13px; color:var(--hint); margin-top:6px;"><i class="far fa-clock"></i> ${time}</div></div>
                        <div class="odds-block">
                            <div class="odd-btn" data-bet="home"><div class="odd-label">1</div><div class="odd-value">${odds.home}</div></div>
                            <div class="odd-btn" data-bet="draw"><div class="odd-label">X</div><div class="odd-value">${odds.draw}</div></div>
                            <div class="odd-btn" data-bet="away"><div class="odd-label">2</div><div class="odd-value">${odds.away}</div></div>
                        </div>
                    </div>`;
                });
                container.innerHTML = html;
                container.querySelectorAll('.match-item').forEach(el => {
                    el.addEventListener('click', (e) => {
                        if (e.target.closest('.odd-btn')) {
                            e.stopPropagation();
                            alert('Ставки отключены (геймификация)');
                            return;
                        }
                        this.showMatchStats(el.dataset.matchId);
                    });
                });
            },

            // Админ-панель для ввода результата
            renderAdminPanel() {
                if (!this.isAdmin) return;
                const panel = document.getElementById('adminMatchPanel');
                const scheduledMatches = this.matches.filter(m => m.status === 'scheduled').slice(0, 5);
                if (scheduledMatches.length === 0) { panel.innerHTML = '<p>Нет матчей для ввода</p>'; panel.classList.remove('hidden'); return; }
                let html = '<h4>🔧 Админ: внести результат</h4>';
                scheduledMatches.forEach(m => {
                    const home = this.teams.find(t => t.id === m.home_team_id);
                    const away = this.teams.find(t => t.id === m.away_team_id);
                    html += `<div style="margin-bottom:16px; padding:12px; background:var(--bg); border-radius:16px;">
                        <p><strong>${home?.name} vs ${away?.name}</strong> (${new Date(m.match_date).toLocaleDateString()})</p>
                        <div style="display:flex; gap:8px;">
                            <input type="number" id="score_${m.id}_home" placeholder="Хозяева" style="width:80px;">
                            <input type="number" id="score_${m.id}_away" placeholder="Гости" style="width:80px;">
                            <button class="admin-btn" data-match-id="${m.id}">Сохранить</button>
                        </div>
                    </div>`;
                });
                html += '<p><em>После сохранения матч перейдёт в статус finished и обновит статистику.</em></p>';
                panel.innerHTML = html;
                panel.classList.remove('hidden');
                // Обработчики кнопок
                panel.querySelectorAll('.admin-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const matchId = btn.dataset.matchId;
                        const homeScore = +document.getElementById(`score_${matchId}_home`).value;
                        const awayScore = +document.getElementById(`score_${matchId}_away`).value;
                        if (isNaN(homeScore) || isNaN(awayScore)) return alert('Введите числа');
                        await this.updateMatchResult(matchId, homeScore, awayScore);
                    });
                });
            },

            async updateMatchResult(matchId, homeScore, awayScore) {
                const { error } = await supabase
                    .from('matches')
                    .update({ 
                        home_score: homeScore, 
                        away_score: awayScore, 
                        status: 'finished',
                        updated_at: new Date()
                    })
                    .eq('id', matchId);
                if (error) {
                    alert('Ошибка: ' + error.message);
                } else {
                    alert('Результат сохранён!');
                    await this.loadData(); // перезагружаем данные
                    this.renderMatches();
                    this.renderRating();
                    this.renderLeagues();
                }
            },

            showMatchStats(matchId) { /* можно реализовать детализацию как раньше */ 
                document.getElementById('modalMatchContent').innerHTML = '<p>Детальная статистика появится позже.</p>';
                document.getElementById('matchModal').classList.add('active');
            },
            closeModal() { document.getElementById('matchModal').classList.remove('active'); },

            switchTab(tabId) {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelector(`.tab-btn[data-tab="${tabId}"]`).classList.add('active');
                ['rating-tab','leagues-tab','matches-tab'].forEach(id => document.getElementById(id).classList.add('hidden'));
                document.getElementById(`${tabId}-tab`).classList.remove('hidden');
                if (tabId === 'rating') this.renderRating();
                else if (tabId === 'leagues') this.renderLeagues();
                else if (tabId === 'matches') this.renderMatches();
            }
        };

        // Инициализация при загрузке
        window.addEventListener('load', async () => {
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 400);
            }, 1200);
            
            await app.loadData();
            app.renderRating();
            
            // Обработчики
            document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => app.switchTab(b.dataset.tab)));
            document.querySelectorAll('.rating-toggle-btn').forEach(btn => btn.addEventListener('click', function() {
                document.querySelectorAll('.rating-toggle-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                app.currentRatingType = this.dataset.rating;
                app.renderRating();
            }));
            
            // Админ-режим по долгому нажатию на логотип
            const logo = document.getElementById('adminTrigger');
            let pressTimer;
            logo.addEventListener('mousedown', () => { pressTimer = setTimeout(() => { app.isAdmin = !app.isAdmin; alert('Админ-режим: ' + (app.isAdmin ? 'ВКЛ' : 'ВЫКЛ')); if (app.currentTab === 'matches') app.renderMatches(); }, 1000); });
            logo.addEventListener('mouseup', () => clearTimeout(pressTimer));
            logo.addEventListener('mouseleave', () => clearTimeout(pressTimer));
            logo.addEventListener('touchstart', (e) => { pressTimer = setTimeout(() => { app.isAdmin = !app.isAdmin; alert('Админ-режим: ' + (app.isAdmin ? 'ВКЛ' : 'ВЫКЛ')); if (app.currentTab === 'matches') app.renderMatches(); }, 1000); });
            logo.addEventListener('touchend', () => clearTimeout(pressTimer));
            
            // Тема
            const themeToggle = document.getElementById('themeToggle');
            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('dark');
                const icon = themeToggle.querySelector('i');
                if (document.body.classList.contains('dark')) {
                    icon.className = 'fas fa-moon';
                    themeToggle.innerHTML = '<i class="fas fa-moon"></i><span>Тема</span>';
                } else {
                    icon.className = 'fas fa-sun';
                    themeToggle.innerHTML = '<i class="fas fa-sun"></i><span>Тема</span>';
                }
            });
            
            document.querySelector('.modal').addEventListener('click', (e) => { if (e.target.classList.contains('modal')) app.closeModal(); });
        });

        window.app = app;
    </script>
</body>
</html>
