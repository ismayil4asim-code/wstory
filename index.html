<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WStory · Система изучения игр</title>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Telegram Mini App (не обязательно, но оставим) -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Шрифт -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #1a1b1e; --card: #2c2d30; --text: #f0f0f0; --hint: #9a9b9e;
            --link: #5eb0ff; --btn: #2ea6ff; --btn-text: #fff; --divider: rgba(255,255,255,0.08);
            --success: #2ecc71; --danger: #e74c3c;
        }
        body.light {
            --bg: #f5f7fa; --card: #fff; --text: #1e1f22; --hint: #8e8e93;
            --link: #2481cc; --btn: #2ea6ff; --divider: rgba(0,0,0,0.06);
        }
        body {
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
            min-height: 100vh; padding-bottom: 24px; transition: background 0.2s;
        }
        .container { max-width: 480px; margin: 0 auto; padding: 16px 16px 28px; }
        /* Header */
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-icon {
            width: 44px; height: 44px; background: linear-gradient(145deg, #13294b, #0b1a2f);
            border-radius: 16px; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 24px;
        }
        .logo h1 { font-size: 22px; font-weight: 700; }
        .logo span { font-size: 13px; color: var(--hint); display: block; }
        .theme-btn {
            background: var(--card); border: 1px solid var(--divider); border-radius: 30px;
            padding: 8px 14px; display: flex; align-items: center; gap: 8px; cursor: pointer;
            font-weight: 500; font-size: 14px;
        }
        /* Tabs */
        .tabs {
            display: flex; background: var(--card); border-radius: 24px; padding: 4px;
            margin-bottom: 24px; border: 1px solid var(--divider);
        }
        .tab {
            flex: 1; padding: 12px; border: none; background: transparent; font-weight: 600;
            font-size: 15px; border-radius: 20px; color: var(--hint); cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .tab.active { background: var(--btn); color: var(--btn-text); }
        /* Cards */
        .card {
            background: var(--card); border-radius: 26px; padding: 18px 16px;
            border: 1px solid var(--divider); margin-top: 8px;
        }
        .table { width: 100%; border-collapse: collapse; }
        .table th { text-align: left; font-size: 12px; font-weight: 600; color: var(--hint); padding-bottom: 10px; }
        .table td { padding: 12px 0; border-bottom: 1px solid var(--divider); }
        .team-cell { display: flex; align-items: center; gap: 12px; }
        .team-logo {
            width: 32px; height: 32px; border-radius: 10px; background: var(--bg);
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            border: 1px solid var(--divider);
        }
        .team-logo img { width: 100%; height: 100%; object-fit: cover; }
        .hidden { display: none !important; }
        .loader {
            width: 30px; height: 30px; border: 3px solid var(--divider);
            border-top-color: var(--btn); border-radius: 50%; animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-message { color: var(--danger); text-align: center; padding: 20px; }
        .league-chip {
            background: var(--card); border: 1px solid var(--divider); border-radius: 40px;
            padding: 8px 18px; font-weight: 600; white-space: nowrap; cursor: pointer;
            display: inline-block; margin-right: 8px;
        }
        .league-chip.active { background: var(--btn); color: white; }
        .filter-select {
            background: var(--card); border: 1px solid var(--divider); border-radius: 30px;
            padding: 10px 16px; width: 100%; margin-bottom: 16px; color: var(--text);
        }
        .match-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 0; border-bottom: 1px solid var(--divider);
        }
        .odds { display: flex; gap: 8px; }
        .odd {
            background: var(--bg); border: 1px solid var(--divider); border-radius: 14px;
            padding: 8px 12px; min-width: 60px; text-align: center;
        }
        .odd-value { font-size: 17px; font-weight: 700; }
    </style>
</head>
<body class="dark">
<div class="container">
    <div class="header">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-futbol"></i></div>
            <div><h1>WStory</h1><span>система изучения игр</span></div>
        </div>
        <div class="theme-btn" id="themeToggle">
            <i class="fas fa-moon"></i> <span>Тема</span>
        </div>
    </div>

    <div class="tabs">
        <button class="tab active" data-tab="rating"><i class="fas fa-trophy"></i> Рейтинг</button>
        <button class="tab" data-tab="leagues"><i class="fas fa-table"></i> Лиги</button>
        <button class="tab" data-tab="matches"><i class="fas fa-calendar"></i> Матчи</button>
    </div>

    <!-- Рейтинг -->
    <div id="rating-pane">
        <div style="display: flex; gap: 8px; margin-bottom: 16px;">
            <button class="league-chip active" data-rating="clubs">🏆 Клубы</button>
            <button class="league-chip" data-rating="leagues">🌍 Лиги</button>
        </div>
        <div class="card">
            <div id="ratingContent"><div class="loader"></div></div>
        </div>
    </div>

    <!-- Лиги -->
    <div id="leagues-pane" class="hidden">
        <div style="margin-bottom: 12px;"><span id="leagueCount"></span></div>
        <div style="display: flex; overflow-x: auto; padding-bottom: 8px;" id="leagueChips"></div>
        <div class="card">
            <div id="leagueTableContent"><div class="loader"></div></div>
        </div>
    </div>

    <!-- Матчи -->
    <div id="matches-pane" class="hidden">
        <select class="filter-select" id="leagueFilter"></select>
        <div class="card">
            <div id="matchesContent"><div class="loader"></div></div>
        </div>
    </div>
</div>

<script>
    (function() {
        // Конфигурация Supabase
        const SUPABASE_URL = 'https://uutcoqfkbijosljtrnsn.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV1dGNvcWZrYmlqb3NsanRybnNuIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NTc3OTA0NCwiZXhwIjoyMDkxMzU1MDQ0fQ.GfYMIVtrgs-pT6EZyd9Dxn9ZW4_wMxZIoprtq2zB8us';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Состояние
        let leagues = [], teams = [], matches = [], teamStats = new Map();
        let currentRating = 'clubs';
        let selectedLeagueId = null;
        let matchLeagueFilter = 'all';

        // DOM элементы
        const ratingContent = document.getElementById('ratingContent');
        const leagueChipsDiv = document.getElementById('leagueChips');
        const leagueTableContent = document.getElementById('leagueTableContent');
        const leagueCountSpan = document.getElementById('leagueCount');
        const leagueFilter = document.getElementById('leagueFilter');
        const matchesContent = document.getElementById('matchesContent');

        // Инициализация данных
        async function loadData() {
            try {
                const [l, t, m, s] = await Promise.all([
                    supabase.from('leagues').select('*'),
                    supabase.from('teams').select('*'),
                    supabase.from('matches').select('*'),
                    supabase.from('team_stats').select('*')
                ]);
                if (l.error) throw l.error;
                if (t.error) throw t.error;
                if (m.error) throw m.error;
                if (s.error) console.warn('team_stats view missing, using empty');
                
                leagues = l.data || [];
                teams = t.data || [];
                matches = m.data || [];
                teamStats.clear();
                (s.data || []).forEach(stat => teamStats.set(stat.team_id, stat));
                return true;
            } catch (e) {
                console.error('Supabase error:', e);
                return false;
            }
        }

        // Вычисление коэффициентов
        function getClubCoeff(teamId) {
            const team = teams.find(t => t.id === teamId);
            const stats = teamStats.get(teamId);
            if (team?.coefficient) return team.coefficient;
            if (stats) return (stats.points / Math.max(stats.played, 1) * 2.2).toFixed(3);
            return 20;
        }

        function renderRating() {
            if (!teams.length) {
                ratingContent.innerHTML = '<div class="error-message">Нет данных о командах</div>';
                return;
            }
            if (currentRating === 'clubs') {
                const sorted = teams.map(t => ({ ...t, coeff: +getClubCoeff(t.id) }))
                                    .sort((a,b) => b.coeff - a.coeff).slice(0, 30);
                let html = `<table class="table"><thead><tr><th>#</th><th>Клуб</th><th>Коэфф.</th></tr></thead><tbody>`;
                sorted.forEach((t, i) => {
                    const logo = t.logo_url ? `<img src="${t.logo_url}">` : t.short_name || t.name.slice(0,2);
                    html += `<tr><td>${i+1}</td><td><div class="team-cell"><div class="team-logo">${logo}</div>${t.name}</div></td><td>${t.coeff.toFixed(3)}</td></tr>`;
                });
                html += '</tbody></table>';
                ratingContent.innerHTML = html;
            } else {
                const leagueCoeffs = leagues.map(l => {
                    const leagueTeams = teams.filter(t => t.league_id === l.id);
                    let sum = 0, cnt = 0;
                    leagueTeams.forEach(t => { const c = +getClubCoeff(t.id); if (!isNaN(c)) { sum += c; cnt++; } });
                    return { ...l, coeff: cnt ? (sum / cnt).toFixed(3) : '0.000' };
                }).sort((a,b) => b.coeff - a.coeff);
                let html = `<table class="table"><thead><tr><th>#</th><th>Лига</th><th>Коэфф.</th></tr></thead><tbody>`;
                leagueCoeffs.forEach((l, i) => {
                    const logo = l.logo_url ? `<img src="${l.logo_url}">` : l.country || '🌍';
                    html += `<tr><td>${i+1}</td><td><div class="team-cell"><div class="team-logo">${logo}</div>${l.name}</div></td><td>${l.coeff}</td></tr>`;
                });
                html += '</tbody></table>';
                ratingContent.innerHTML = html;
            }
        }

        function renderLeagues() {
            leagueChipsDiv.innerHTML = leagues.map(l => 
                `<span class="league-chip ${selectedLeagueId === l.id ? 'active' : ''}" data-id="${l.id}">${l.country||'🌍'} ${l.name}</span>`
            ).join('');
            leagueCountSpan.innerText = `${leagues.length} лиг`;
            document.querySelectorAll('#leagueChips .league-chip').forEach(el => {
                el.addEventListener('click', () => {
                    selectedLeagueId = el.dataset.id;
                    renderLeagues();
                    renderLeagueTable();
                });
            });
            if (!selectedLeagueId && leagues.length) selectedLeagueId = leagues[0].id;
            renderLeagueTable();
        }

        function renderLeagueTable() {
            const league = leagues.find(l => l.id === selectedLeagueId);
            if (!league) { leagueTableContent.innerHTML = '<div class="error-message">Лига не выбрана</div>'; return; }
            const leagueTeams = teams.filter(t => t.league_id === selectedLeagueId);
            const rows = leagueTeams.map(t => {
                const stats = teamStats.get(t.id) || { played:0, wins:0, draws:0, losses:0, goals_for:0, goals_against:0, points:0 };
                return { team: t, stats };
            }).sort((a,b) => b.stats.points - a.stats.points || (b.stats.goals_for - b.stats.goals_against) - (a.stats.goals_for - a.stats.goals_against));
            
            let html = `<h3 style="margin-bottom:12px;">${league.name}</h3>`;
            html += `<table class="table"><thead><tr><th>#</th><th>Команда</th><th>И</th><th>В</th><th>Н</th><th>П</th><th>Мячи</th><th>О</th></tr></thead><tbody>`;
            rows.forEach((row, idx) => {
                const s = row.stats;
                const logo = row.team.logo_url ? `<img src="${row.team.logo_url}">` : row.team.short_name || row.team.name.slice(0,2);
                html += `<tr><td>${idx+1}</td><td><div class="team-cell"><div class="team-logo">${logo}</div>${row.team.name}</div></td>
                    <td>${s.played}</td><td>${s.wins}</td><td>${s.draws}</td><td>${s.losses}</td><td>${s.goals_for}:${s.goals_against}</td><td>${s.points}</td></tr>`;
            });
            html += '</tbody></table>';
            leagueTableContent.innerHTML = html;
        }

        function renderMatches() {
            leagueFilter.innerHTML = '<option value="all">Все лиги</option>' + leagues.map(l => `<option value="${l.id}">${l.name}</option>`).join('');
            leagueFilter.value = matchLeagueFilter;
            leagueFilter.onchange = () => { matchLeagueFilter = leagueFilter.value; renderMatchesList(); };
            renderMatchesList();
        }

        function renderMatchesList() {
            let filtered = matches.filter(m => m.status === 'scheduled');
            if (matchLeagueFilter !== 'all') filtered = filtered.filter(m => m.league_id === matchLeagueFilter);
            filtered.sort((a,b) => new Date(a.match_date) - new Date(b.match_date));
            if (!filtered.length) { matchesContent.innerHTML = '<div class="error-message">Нет предстоящих матчей</div>'; return; }
            let html = '';
            filtered.slice(0, 20).forEach(m => {
                const home = teams.find(t => t.id === m.home_team_id);
                const away = teams.find(t => t.id === m.away_team_id);
                if (!home || !away) return;
                const hCoeff = +getClubCoeff(home.id);
                const aCoeff = +getClubCoeff(away.id);
                const homeOdd = Math.max(1.03, (1 / (hCoeff / (hCoeff + aCoeff + 2))).toFixed(2));
                const awayOdd = Math.max(1.03, (1 / (aCoeff / (hCoeff + aCoeff + 2))).toFixed(2));
                const drawOdd = Math.max(1.03, (1 / (2 / (hCoeff + aCoeff + 2))).toFixed(2));
                const date = new Date(m.match_date);
                const time = date.toLocaleDateString('ru',{day:'numeric',month:'short'}) + ' ' + date.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
                html += `<div class="match-row"><div><div class="team-cell"><div class="team-logo">${home.logo_url ? `<img src="${home.logo_url}">` : home.short_name}</div>${home.name}</div>
                    <div class="team-cell"><div class="team-logo">${away.logo_url ? `<img src="${away.logo_url}">` : away.short_name}</div>${away.name}</div>
                    <div style="font-size:13px; color:var(--hint); margin-top:6px;">${time}</div></div>
                    <div class="odds"><div class="odd"><div>1</div><div class="odd-value">${homeOdd}</div></div>
                    <div class="odd"><div>X</div><div class="odd-value">${drawOdd}</div></div>
                    <div class="odd"><div>2</div><div class="odd-value">${awayOdd}</div></div></div></div>`;
            });
            matchesContent.innerHTML = html;
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add('active');
            document.getElementById('rating-pane').classList.add('hidden');
            document.getElementById('leagues-pane').classList.add('hidden');
            document.getElementById('matches-pane').classList.add('hidden');
            document.getElementById(`${tabId}-pane`).classList.remove('hidden');
            if (tabId === 'rating') renderRating();
            else if (tabId === 'leagues') renderLeagues();
            else if (tabId === 'matches') renderMatches();
        }

        // Старт
        window.addEventListener('load', async () => {
            const success = await loadData();
            if (!success) {
                ratingContent.innerHTML = '<div class="error-message">Ошибка подключения к базе данных. Проверьте Supabase.</div>';
            }
            renderRating();

            // Вкладки
            document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));
            // Переключатель рейтинга
            document.querySelectorAll('[data-rating]').forEach(btn => btn.addEventListener('click', function() {
                document.querySelectorAll('[data-rating]').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentRating = this.dataset.rating;
                renderRating();
            }));

            // Тема
            const themeBtn = document.getElementById('themeToggle');
            themeBtn.addEventListener('click', () => {
                document.body.classList.toggle('light');
                const icon = themeBtn.querySelector('i');
                if (document.body.classList.contains('light')) {
                    icon.className = 'fas fa-sun';
                    themeBtn.innerHTML = '<i class="fas fa-sun"></i> <span>Тема</span>';
                } else {
                    icon.className = 'fas fa-moon';
                    themeBtn.innerHTML = '<i class="fas fa-moon"></i> <span>Тема</span>';
                }
            });
        });
    })();
</script>
</body>
</html>
