<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WStory · Система изучения игр</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ... (стили из предыдущего ответа, плюс дополнения ниже) ... */
        .uefa-table tbody tr:nth-child(even) { background: rgba(128,128,128,0.03); }
        .pos-indicator { font-size: 14px; margin-left: 4px; }
        .pos-up { color: #2ecc71; }
        .pos-down { color: #e74c3c; }
        .form-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 3px; }
        .form-win { background: #2ecc71; }
        .form-draw { background: #f39c12; }
        .form-loss { background: #e74c3c; }
        .team-cell { gap: 12px; }
        .league-table-container { overflow-x: auto; }
    </style>
</head>
<body class="dark">
    <!-- ... (структура как в предыдущем ответе) ... -->
    <script>
        // ... (код приложения) ...
        // В renderLeagueTable добавим логику изменения позиций
        renderLeagueTable() {
            const container = document.getElementById('leagueTableContainer');
            const league = this.leagues.find(l => l.id === this.selectedLeagueId);
            if (!league) { container.innerHTML = '<div class="empty-state">Выберите лигу</div>'; return; }
            const leagueTeams = this.teams.filter(t => t.league_id === this.selectedLeagueId);
            const stats = leagueTeams.map(t => ({ team: t, stats: this.teamStatsMap.get(t.id) || { played:0, wins:0, draws:0, losses:0, goals_for:0, goals_against:0, goal_diff:0, points:0 } }))
                .sort((a,b) => b.stats.points - a.stats.points || b.stats.goal_diff - a.stats.goal_diff);
            
            // Определяем изменение позиции (сравниваем с предыдущим рендером)
            const prevOrder = this.previousLeagueOrder || [];
            const currentOrder = stats.map(s => s.team.id);
            this.previousLeagueOrder = currentOrder;
            
            let html = `<div style="display:flex; gap:10px; margin-bottom:16px;"><span style="font-size:28px;">${league.country || '🌍'}</span><h3>${league.name}</h3></div>`;
            html += `<div class="league-table-container"><table class="uefa-table"><thead><tr><th>#</th><th>Команда</th><th>И</th><th>В</th><th>Н</th><th>П</th><th>Мячи</th><th>О</th></tr></thead><tbody>`;
            stats.forEach((item, idx) => {
                const s = item.stats;
                const logoHtml = item.team.logo_url ? `<img src="${item.team.logo_url}" onerror="this.style.display='none';">` : item.team.short_name || item.team.name.substring(0,2);
                // Изменение позиции
                const prevIdx = prevOrder.indexOf(item.team.id);
                let posChange = '';
                if (prevIdx !== -1) {
                    if (idx < prevIdx) posChange = `<span class="pos-indicator pos-up">▲${prevIdx - idx}</span>`;
                    else if (idx > prevIdx) posChange = `<span class="pos-indicator pos-down">▼${idx - prevIdx}</span>`;
                }
                // Форма (если есть)
                let formHtml = '';
                if (s.form) {
                    formHtml = s.form.split('').map(ch => {
                        let cls = ch === 'W' ? 'form-win' : (ch === 'D' ? 'form-draw' : 'form-loss');
                        return `<span class="form-dot ${cls}"></span>`;
                    }).join('');
                }
                html += `<tr><td>${idx+1} ${posChange}</td><td><div class="team-cell"><div class="team-logo">${logoHtml}</div>${item.team.name} ${formHtml}</div></td>
                    <td>${s.played}</td><td>${s.wins}</td><td>${s.draws}</td><td>${s.losses}</td><td>${s.goals_for}:${s.goals_against}</td><td><strong>${s.points}</strong></td></tr>`;
            });
            html += '</tbody></table></div>';
            container.innerHTML = html;
        }
        // ...
    </script>
</body>
</html>
